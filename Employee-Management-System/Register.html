<!DOCTYPE html>
<html lang="en">
<head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background:
    linear-gradient(
    135deg,
    #e0f2fe 0%,
    #dbeafe 50%,
    #ffffff 100%);

    background-image:url('pic.jpeg');

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:25px;

    backdrop-filter:blur(14px);
}

.container{
    width:100%;
    max-width:550px;
    text-align:center;
}

.logo-section{
    margin-bottom:30px;
}

.logo{
    font-size:60px;
    margin-bottom:15px;
}

.logo .fa-users{
    background:linear-gradient(
    90deg,
    #3b82f6 0%,
    #f97316 50%,
    #10b981 100%);

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.logo-section h1{
    color:darkblue;
    font-size:28px;
    font-weight:700;
    letter-spacing:0.5px;
    margin-bottom:8px;
}

.subtitle{
    color:black;
    font-size:18px;
}

.register-card{
    background:white;
    border-radius:12px;
    padding:35px 30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:left;
    backdrop-filter:blur(10px);
}

.user-icon{
    width:65px;
    height:65px;

    margin:auto;
    margin-bottom:25px;

    background:#eef4ff;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
    color:mediumblue;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    color:black;
    font-size:18px;
    font-weight:500;
    margin-bottom:8px;
}

.input-wrapper{
    position:relative;
}

.input-wrapper .icon{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:black;
    font-size:14px;
}

.input-wrapper input,
.input-wrapper select{
    width:100%;
    padding:12px 12px 12px 40px;
    border:1px solid #e2e8f0;
    border-radius:6px;
    font-size:14px;
    background:#f8fafc;
    transition:all 0.3s;
}

.input-wrapper input:focus,
.input-wrapper select:focus{
    outline:none;
    border-color:#3b82f6;
    background:white;
    box-shadow:0 0 0 3px rgba(59,130,246,0.1);
}

.form-options{
    margin-bottom:25px;
}

.checkbox-label{
    display:flex;
    align-items:center;
    color:black;
    font-size:15px;
    cursor:pointer;
}

.checkbox-label input{
    margin-right:8px;
    cursor:pointer;
}

.button-group{
    display:flex;
    gap:12px;
}

.btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.3s;
}

.btn-register{
    background-color:mediumblue;
    color:white;
}

.btn-register:hover{
    background:#2563eb;
    transform:translateY(-1px);
    box-shadow:0 4px 12px rgba(59,130,246,0.4);
}

.btn-clear{
    background-color:lightgray;
    color:black;
}

.btn-clear:hover{
    background:#d1d5db;
}

footer{
    margin-top:25px;
}

footer p{
    color:black;
    font-size:15px;
}

@media (max-width:480px){

    .register-card{
        padding:30px 25px;
    }

    .logo-section h1{
        font-size:18px;
    }

    .button-group{
        flex-direction:column;
    }

}

</style>

<title>Employee Management System - Register</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="container">
   <div class="logo-section">
   <div class="logo">
            <i class="fas fa-users"></i>
   </div>
        <h1><b>EMPLOYEE MANAGEMENT SYSTEM</b></h1>
        <p class="subtitle">Admin Registration</p>

   </div>

<div class="register-card">
   <div class="user-icon">
            <i class="fas fa-user-plus"></i>
   </div>

        <form id="registerForm">

            <div class="form-group">
               <label><b>Full Name</b></label>

                <div class="input-wrapper">

                    <i class="fas fa-user icon"></i>

                    <input type="text"
                    id="fullname"
                    placeholder="Enter full name">

                </div>

            </div>

            <div class="form-group">

                <label>
                    <b>Username</b>
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-user icon"></i>

                    <input type="text"
                    id="username"
                    placeholder="Enter username">

                </div>

            </div>

            <div class="form-group">

                <label>
                    <b>Email</b>
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-envelope icon"></i>

                    <input type="email"
                    id="email"
                    placeholder="Enter email address">

                </div>

            </div>

            <div class="form-group">

                <label>
                    <b>Password</b>
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-lock icon"></i>

                    <input type="password"
                    id="password"
                    placeholder="Enter password">

                </div>

            </div>

            <div class="form-group">

                <label>
                    <b>Confirm Password</b>
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-lock icon"></i>

                    <input type="password"
                    id="confirmPassword"
                    placeholder="Confirm password">

                </div>

            </div>

            <div class="form-options">

                <label class="checkbox-label">

                    <input type="checkbox"
                    id="showPassword">

                    <span>Show Password</span>

                </label>

            </div>

            <div class="form-group">

                <label>
                    <b>Role</b>
                </label>

                <div class="input-wrapper">

                    <i class="fas fa-user-shield icon"></i>

                    <select id="role">

                        <option>Admin</option>
                        <option>HR Manager</option>
                        <option>Supervisor</option>

                    </select>

                </div>

            </div>

            <div class="button-group">

                <button type="submit"
                class="btn btn-register">
                    <b>REGISTER</b>
                </button>

                <button type="button"
                class="btn btn-clear"
                id="clearBtn">
                    <b>CLEAR</b>
                </button>

            </div>

        </form>

    </div>

    <footer>
        <p>©️ 2026 EMS. All rights reserved.</p>
    </footer>

</div>

<script>

document.getElementById('showPassword')
.addEventListener('change', function(){

    const passwordField =
    document.getElementById('password');

    const confirmField =
    document.getElementById('confirmPassword');

    passwordField.type =
    this.checked ? 'text' : 'password';

    confirmField.type =
    this.checked ? 'text' : 'password';

});

document.getElementById('clearBtn')
.addEventListener('click', function(){

    document.getElementById('fullname').value = '';

    document.getElementById('username').value = '';

    document.getElementById('email').value = '';

    document.getElementById('password').value = '';

    document.getElementById('confirmPassword').value = '';

    document.getElementById('fullname').focus();

});

document.getElementById('registerForm')
.addEventListener('submit', function(e){

    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const role = document.getElementById('role').value;

    if (!fullname || !username || !email || !password || !confirmPassword) {
        alert('Please fill in all fields!');
        return;
    }

    if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
    }

    if (password.length < 6) {
        alert('Password must be at least 6 characters!');
        return;
    }

    const submitBtn = document.querySelector('#registerForm .btn-register');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Please wait...';

    fetch('register.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullname, username, email, password, confirmPassword, role })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            alert('Registration Successful! Please login.');
            window.location.href = 'login.html';
        } else {
            alert(data.message || 'Registration failed. Please try again.');
        }
    })
    .catch(() => alert('Something went wrong. Please try again.'))
    .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<b>REGISTER</b>';
    });

});

</script>

</body>
</html>
