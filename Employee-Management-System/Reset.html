<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 50%, #ffffff 100%);
        background-image: url('pic.jpeg');
        backdrop-filter: blur(14px);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .container {
        width: 100%;
        max-width: 450px;
        text-align: center;
    }
    .logo-section {
        margin-bottom: 25px;
    }
    .logo {
        font-size: 60px;
        margin-bottom: 12px;
    }
    .logo .fa-users {
        background: linear-gradient(90deg, #3b82f6 0%, #f97316 50%, #10b981 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .logo-section h1 {
        color: #0b34bb;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }
    .subtitle {
        color: #454f5d;
        font-size: 18px;
    }
    .login-card {
        background: white;
        border-radius: 12px;
        padding: 30px 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        text-align: left;
    }
    .form-icon {
        text-align: center;
        margin-bottom: 20px;
    }
    .form-icon i {
        font-size: 35px;
        color: #e51616;
        background: #cdd4db;
        padding: 18px;
        border-radius: 50%;
    }
    .form-group {
        margin-bottom: 18px;
    }
    .form-group label {
        display: block;
        color: #334155;
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 8px;
    }
    .input-wrapper {
        position: relative;
    }
    .input-wrapper .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #070e17;
        font-size: 14px;
        pointer-events: none;
    }
    .input-wrapper input, .input-wrapper select {
        width: 100%;
        padding: 12px 12px 12px 40px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 14px;
        background: #f8fafc;
        transition: all 0.3s;
    }
    .input-wrapper input:focus, .input-wrapper select:focus {
        outline: none;
        border-color: #3b82f6;
        background: white;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 25px;
    }
    .btn {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn-primary {
        background: #024dc6;
        color: white;
    }
    .btn-primary:hover {
        background: #0246da;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    .btn-secondary {
        background: #e5e7eb;
        color: #121416;
    }
    .btn-secondary:hover {
        background: #d1d5db;
    }
    footer {
        margin-top: 25px;
    }
    footer p {
        color: #435062;
        font-size: 16px;
    }
    @media (max-width: 480px) {
        .login-card {
            padding: 25px 20px;
        }
        .logo-section h1 {
            font-size: 18px;
        }
        .button-group {
            flex-direction: column;
        }
    }
    </style>

    <title>EMS - Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <i class="fas fa-users"></i>
            </div>
            <h1><b>EMPLOYEE MANAGEMENT SYSTEM</b></h1>
            <p class="subtitle">Reset Your Password</p>
        </div>

        <div class="login-card">
            <div class="form-icon">
                <i class="fas fa-unlock-alt"></i>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label><b>Username / Email</b></label>
                    <div class="input-wrapper">
                        <i class="fas fa-user icon"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><b>New Password</b></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="newPass" name="newPass" placeholder="Enter new password" required>
                    </div>
                </div>

                <div class="form-group">
                    <label><b>Confirm Password</b></label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock icon"></i>
                        <input type="password" id="confirmPass" name="confirmPass" placeholder="Confirm new password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                       <input type="checkbox" id="showPassword">
                    <span>Show Password</span>
                    </label>
                </div>

                <div class="button-group">
                    <button type="submit" id="resetBtn" class="btn btn-primary">RESET PASSWORD</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">BACK TO LOGIN</button>
                </div>
            </form> 
        </div>

        <footer><p>©️ 2026 EMS. All rights reserved.</p></footer>
    </div>

    <script>
  
    document.getElementById('showPassword').addEventListener('change', function(){
        const newPassField = document.getElementById('newPass');
        const confirmPassField = document.getElementById('confirmPass');
        
        newPassField.type = this.checked ? 'text' : 'password';
        confirmPassField.type = this.checked ? 'text' : 'password';
    });

    document.getElementById('resetForm').addEventListener('submit', function(e){
        e.preventDefault();
        const username = document.getElementById('username').value;
        const newPassword = document.getElementById('newPass').value;
        const confirmPassword = document.getElementById('confirmPass').value;

        if (newPassword !== confirmPassword) {
            alert('Passwords do not match!');
            return;
        }

        fetch('reset_password.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, newPassword })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('Password reset successful! Please login.');
                window.location.href = 'login.html';
            } else {
                alert(data.message || 'Reset failed.');
            }
        })
        .catch(() => alert('Something went wrong. Please try again.'));
    });

    </script>
</body>
</html>
