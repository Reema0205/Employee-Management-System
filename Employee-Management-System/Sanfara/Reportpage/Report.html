<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Reports Dashboard</title>
    <link rel="stylesheet" href="Report.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<a href="../../index.php" style="position:fixed;top:14px;left:14px;z-index:9999;background:#1d4ed8;color:#fff;padding:8px 14px;border-radius:8px;font-family:sans-serif;font-size:14px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.25);">⬅ Dashboard</a>

<div class="container">

    <div class="header">
        <h2>Reports</h2>
    </div>

    <div class="content">

        <div class="sidebar">
            <h3>Select Report</h3>

            <div class="report active" onclick="changeReport('Employee')">
                <span class="icon">📊</span> Employee Report
            </div>

            <div class="report" onclick="changeReport('Attendance')">
                <span class="icon">📅</span> Attendance Report
            </div>

            <div class="report" onclick="changeReport('Leave')">
                <span class="icon">📄</span> Leave Report
            </div>

            <div class="report" onclick="changeReport('Payroll')">
                <span class="icon">📁</span> Payroll Report
            </div>

            <div class="report" onclick="changeReport('Performance')">
                <span class="icon">🏅</span> Performance Report
            </div>
        </div>

        <div class="filters">
            <h3>Filters</h3>

            <label>From Date :</label>
            <input type="date" value="2026-05-01">

            <label>To Date :</label>
            <input type="date" value="2026-05-31">

            <label>Department :</label>
            <select>
                <option>All</option>
                <option>HR</option>
                <option>IT</option>
                <option>Finance</option>
            </select>
        </div>

        <div class="preview">
            <h3 id="reportTitle">Employee Report Preview</h3>

            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>

            <div class="buttons">
                <button class="excel" onclick="exportExcel()">Export Excel</button>
                <button class="pdf" onclick="exportPDF()">Export PDF</button>
                <button class="print" onclick="window.print()">Print</button>
            </div>
        </div>

    </div>

</div>

<script src="Report.js"></script>
</body>
</html>
